<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello, world.</title>
    <style>
      :root {
        --text: #f5f7ff;
        --overlay: rgba(7, 10, 25, 0.45);
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        color: var(--text);
        background:
          radial-gradient(circle at 78% 12%, rgba(255,255,255,0.42) 0 0.6px, transparent 1px),
          radial-gradient(circle at 23% 28%, rgba(255,255,255,0.4) 0 0.7px, transparent 1px),
          radial-gradient(circle at 64% 74%, rgba(255,255,255,0.34) 0 0.8px, transparent 1px),
          radial-gradient(circle at 12% 88%, rgba(255,255,255,0.32) 0 0.7px, transparent 1px),
          radial-gradient(circle at 92% 56%, rgba(255,255,255,0.35) 0 0.8px, transparent 1px),
          radial-gradient(ellipse at 60% 35%, rgba(196, 171, 255, 0.24), transparent 46%),
          radial-gradient(ellipse at 42% 58%, rgba(255, 205, 151, 0.16), transparent 54%),
          radial-gradient(ellipse at center, #1a2554 0%, #0b1025 55%, #050814 100%);
        background-size:
          210px 210px,
          180px 180px,
          250px 250px,
          230px 230px,
          270px 270px,
          cover,
          cover,
          cover;
        position: relative;
        overflow: hidden;
      }

      body::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(0,0,0,0.15), var(--overlay));
      }

      h1 {
        margin: 0;
        position: relative;
        z-index: 1;
        font-weight: 600;
        letter-spacing: 0.02em;
        font-size: clamp(2rem, 6vw, 3.5rem);
        text-shadow: 0 4px 20px rgba(0, 0, 0, 0.75);
      }
    </style>
  </head>
  <body>
    <h1>Hello, world.</h1>
  </body>
</html>
