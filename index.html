<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello, world.</title>
    <style>
      :root {
        --text: #f5f7ff;
        --overlay: rgba(7, 10, 25, 0.42);
        --px: 0px;
        --py: 0px;
        --scroll-shift: 0px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      body {
        color: var(--text);
        overflow-x: hidden;
        background:
          radial-gradient(ellipse at 60% 35%, rgba(196, 171, 255, 0.22), transparent 46%),
          radial-gradient(ellipse at 42% 58%, rgba(255, 205, 151, 0.15), transparent 54%),
          radial-gradient(ellipse at center, #1a2554 0%, #0b1025 55%, #050814 100%);
        position: relative;
      }

      .scene {
        min-height: 120vh;
        display: grid;
        place-items: center;
        position: relative;
        overflow: hidden;
        isolation: isolate;
      }

      .star-layer {
        position: absolute;
        inset: -8%;
        pointer-events: none;
        will-change: transform, opacity;
      }

      .stars-back {
        opacity: 0.48;
        background-image:
          radial-gradient(circle, rgba(255, 255, 255, 0.62) 0 0.65px, transparent 1px),
          radial-gradient(circle, rgba(198, 222, 255, 0.5) 0 0.55px, transparent 1px),
          radial-gradient(circle, rgba(255, 227, 197, 0.46) 0 0.55px, transparent 1px);
        background-size: 240px 240px, 190px 190px, 280px 280px;
        background-position: 12% 20%, 72% 40%, 50% 85%;
        transform: translate3d(calc(var(--px) * 0.25), calc(var(--py) * 0.25 + var(--scroll-shift) * 0.2), 0);
        animation: twinkle-back 11s ease-in-out infinite alternate;
      }

      .stars-mid {
        opacity: 0.7;
        background-image:
          radial-gradient(circle, rgba(255, 255, 255, 0.95) 0 0.75px, transparent 1px),
          radial-gradient(circle, rgba(217, 233, 255, 0.82) 0 0.7px, transparent 1px),
          radial-gradient(circle, rgba(255, 235, 203, 0.78) 0 0.68px, transparent 1px);
        background-size: 170px 170px, 210px 210px, 260px 260px;
        background-position: 28% 14%, 74% 64%, 13% 78%;
        transform: translate3d(calc(var(--px) * 0.55), calc(var(--py) * 0.55 + var(--scroll-shift) * 0.35), 0);
        animation: twinkle-mid 7.5s ease-in-out infinite alternate;
      }

      .stars-front {
        opacity: 0.88;
        background-image:
          radial-gradient(circle, rgba(255, 255, 255, 1) 0 0.95px, transparent 1.25px),
          radial-gradient(circle, rgba(228, 239, 255, 0.95) 0 0.9px, transparent 1.2px),
          radial-gradient(circle, rgba(255, 244, 227, 0.9) 0 0.88px, transparent 1.2px);
        background-size: 130px 130px, 180px 180px, 220px 220px;
        background-position: 9% 35%, 65% 20%, 82% 77%;
        transform: translate3d(calc(var(--px) * 0.9), calc(var(--py) * 0.9 + var(--scroll-shift) * 0.5), 0);
        animation: twinkle-front 5.6s ease-in-out infinite alternate;
      }

      .vignette {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(0, 0, 0, 0.1), var(--overlay));
        pointer-events: none;
      }

      h1 {
        margin: 0;
        position: relative;
        z-index: 2;
        font-weight: 600;
        letter-spacing: 0.02em;
        font-size: clamp(2rem, 6vw, 3.5rem);
        text-shadow: 0 4px 20px rgba(0, 0, 0, 0.72);
      }

      @keyframes twinkle-back {
        0% {
          opacity: 0.4;
          filter: brightness(0.95);
        }
        100% {
          opacity: 0.56;
          filter: brightness(1.05);
        }
      }

      @keyframes twinkle-mid {
        0% {
          opacity: 0.56;
          filter: brightness(0.9);
        }
        50% {
          opacity: 0.76;
          filter: brightness(1.1);
        }
        100% {
          opacity: 0.68;
          filter: brightness(1);
        }
      }

      @keyframes twinkle-front {
        0% {
          opacity: 0.72;
          filter: brightness(0.88);
        }
        60% {
          opacity: 0.95;
          filter: brightness(1.18);
        }
        100% {
          opacity: 0.8;
          filter: brightness(0.98);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .star-layer {
          animation: none !important;
          transform: none !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="scene" aria-label="Milky way night sky">
      <div class="star-layer stars-back" aria-hidden="true"></div>
      <div class="star-layer stars-mid" aria-hidden="true"></div>
      <div class="star-layer stars-front" aria-hidden="true"></div>
      <div class="vignette" aria-hidden="true"></div>
      <h1>Hello, world.</h1>
    </main>

    <script>
      (() => {
        const reduced = window.matchMedia("(prefers-reduced-motion: reduce)");
        const root = document.documentElement;

        if (reduced.matches) return;

        const isTouch = window.matchMedia("(hover: none), (pointer: coarse)").matches;

        if (isTouch) {
          let raf = null;
          const updateFromScroll = () => {
            raf = null;
            const shift = Math.max(-16, Math.min(16, window.scrollY * 0.04));
            root.style.setProperty("--scroll-shift", `${shift.toFixed(2)}px`);
          };

          window.addEventListener(
            "scroll",
            () => {
              if (raf) return;
              raf = requestAnimationFrame(updateFromScroll);
            },
            { passive: true }
          );
          updateFromScroll();
          return;
        }

        let raf = null;
        let tx = 0;
        let ty = 0;

        const onMove = (event) => {
          const nx = event.clientX / window.innerWidth - 0.5;
          const ny = event.clientY / window.innerHeight - 0.5;
          tx = nx * 18;
          ty = ny * 14;

          if (raf) return;
          raf = requestAnimationFrame(() => {
            raf = null;
            root.style.setProperty("--px", `${tx.toFixed(2)}px`);
            root.style.setProperty("--py", `${ty.toFixed(2)}px`);
          });
        };

        window.addEventListener("pointermove", onMove, { passive: true });
        window.addEventListener("mouseleave", () => {
          root.style.setProperty("--px", "0px");
          root.style.setProperty("--py", "0px");
        });
      })();
    </script>
  </body>
</html>
